name: Android APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend API URL for the APK"
        required: false
        default: "http://10.0.2.2:8080/"

jobs:
  build-apk:
    name: Build debug APK artifact
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build APK
        env:
          HAZELGYM_API_BASE_URL: ${{ inputs.api_base_url }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hazelgym-debug-apk
          path: mobile-android/app/build/outputs/apk/debug/app-debug.apk
