spring.application.name=hazelgym

# Server
server.port=${PORT:8080}

# MySQL
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/hazelgym?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8}
spring.datasource.username=${MYSQL_USERNAME:root}
# Set this in your environment (recommended) or paste here locally (do not commit secrets).
spring.datasource.password=${MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:change-this-secret-in-production-change-this-secret}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:8081,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:8081,http://localhost:*,http://127.0.0.1:*}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
