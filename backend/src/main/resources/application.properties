spring.application.name=hazelgym

# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/hazelgym?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=root
# Set this in your environment (recommended) or paste here locally (do not commit secrets).
spring.datasource.password=${MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Optional: uncomment for SQL debugging during development
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.orm.jdbc.bind=TRACE
