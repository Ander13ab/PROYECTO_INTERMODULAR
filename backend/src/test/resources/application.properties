# Test profile uses an in-memory database so `mvn test` does not require a local MySQL instance.
spring.datasource.url=jdbc:h2:mem:hazelgym_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
